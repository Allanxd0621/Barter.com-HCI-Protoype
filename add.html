<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Add People - Barter</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #01a146;
  padding-bottom: env(safe-area-inset-bottom);
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  background: #111;
  min-height: 100vh;
  padding: 15px;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.back-btn {
  font-size: 1.5em;
  color: #00ffaa;
  cursor: pointer;
}

.header h2 {
  color: #00ffaa;
}

/* USERS */
.user {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.user:hover {
  background: #222;
}

.user img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
}

.user-info h3 {
  font-size: 0.9em;
}

.user-info p {
  font-size: 0.7em;
  color: #ccc;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 95%;
  max-width: 300px;
  text-align: center;
}

.popup-box img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-bottom: 10px;
  object-fit: cover;
}

.popup-box h3 {
  color: #00ffaa;
}

.popup-box p {
  font-size: 0.8em;
  color: #ccc;
}

/* FOLLOW BUTTON */
.follow-btn {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  background: #26e0a2;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;

  opacity: 0.5;
  transition: 0.3s;
}

.follow-btn.active {
  opacity: 1;
}

/* CLOSE */
.close-btn {
  margin-top: 10px;
  font-size: 0.8em;
  color: #aaa;
  cursor: pointer;
  display: block;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="back-btn" onclick="goBack()">←</div>
    <h2>Add People</h2>
  </div>

  <!-- USERS -->
  <div class="user" onclick="openProfile('Mathew Lasheerda','Manila','4.7★','mathew.jpg')">
    <img src="mathew.jpg" onerror="this.src='https://via.placeholder.com/45'">
    <div class="user-info">
      <h3>Mathew Lasheerda</h3>
      <p>Tap to view profile</p>
    </div>
  </div>

  <div class="user" onclick="openProfile('John Lloyd Lugnasin','Cebu','4.9★','lloyd.jpg')">
    <img src="lloyd.jpg" onerror="this.src='https://via.placeholder.com/45'">
    <div class="user-info">
      <h3>John Lloyd Lugnasin</h3>
      <p>Tap to view profile</p>
    </div>
  </div>

  <div class="user" onclick="openProfile('Gaspera Lismoras','Davao','4.5★','gasper.jpg')">
    <img src="gasper.jpg" onerror="this.src='https://via.placeholder.com/45'">
    <div class="user-info">
      <h3>Gaspera Lismoras</h3>
      <p>Tap to view profile</p>
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">

    <img id="profilePic" src="">
    <h3 id="name"></h3>
    <p id="address"></p>
    <p id="rating"></p>

    <button class="follow-btn" id="followBtn">Follow</button>
    <span class="close-btn" onclick="closePopup()">Close</span>

  </div>
</div>

<script>

/* BACK */
function goBack() {
  window.history.back();
}

/* OPEN PROFILE */
function openProfile(name, address, rating, img) {
  document.getElementById("popup").style.display = "flex";

  document.getElementById("name").innerText = name;
  document.getElementById("address").innerText = "📍 " + address;
  document.getElementById("rating").innerText = "⭐ " + rating;

  document.getElementById("profilePic").src = img || 'https://via.placeholder.com/70';

  // reset follow button
  const btn = document.getElementById("followBtn");
  btn.classList.remove("active");
  btn.innerText = "Follow";
}

/* CLOSE */
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* CLICK OUTSIDE CLOSE */
window.onclick = function(e) {
  const popup = document.getElementById("popup");
  if (e.target === popup) {
    popup.style.display = "none";
  }
}

document.getElementById("followBtn").onclick = function() {
  if (this.classList.contains("active")) {
    // Unfollow
    this.classList.remove("active");
    this.innerText = "Follow";
  } else {
    // Follow
    this.classList.add("active");
    this.innerText = "Following";
  }
}

</script>

</body>
</html>
