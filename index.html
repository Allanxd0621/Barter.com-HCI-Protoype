<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started - Barter</title>

<link rel="icon" href="logo.png">
<script src="https://kit.fontawesome.com/a2d9d6c28b.js" crossorigin="anonymous"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #125e41;
  color: white;
}

/* CENTERING */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* BOX */
.login-box {
  width: 90%;
  max-width: 400px;
  background: #1a1a1a;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
}

/* LOGO */
.logo img {
  width: 60px;
}

.logo h2 {
  margin: 5px 0 15px;
}

/* INPUT */
.input-group {
  display: flex;
  align-items: center;
  background: #222;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.input-group i {
  margin-right: 10px;
  color: #00ffaa;
}

.input-group input {
  border: none;
  outline: none;
  background: transparent;
  color: white;
  width: 100%;
  font-size: 16px;
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: #00ffaa;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* POPUP */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
}

.popup-box {
  background: #111;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="login-container">
  <div class="login-box">

    <div class="logo">
      <img src="logo.png">
      <h2>Barter</h2>
    </div>

    <h1>Get Started</h1>
    <p>Start trading your items today</p>

    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="email" placeholder="Gmail Address">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-location-dot"></i>
      <input type="text" id="address" placeholder="Address">
    </div>

    <div class="input-group">
      <i class="fa-solid fa-user"></i>
      <input type="number" id="age" placeholder="Enter Age">
    </div>

    <button class="login-btn" onclick="verifyUser()">Continue</button>

  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2 style="color:#00ffaa;">✅ Verified!</h2>
    <p>Welcome to Barter 🎉</p>
  </div>
</div>

<script>
function verifyUser() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let address = document.getElementById("address").value;
  let age = document.getElementById("age").value;

  if (!name || !email || !address || !age) {
    alert("Please fill in all fields.");
    return;
  }

  if (age < 18) {
    alert("You must be 18 or older.");
    return;
  }

  document.getElementById("popup").style.display = "flex";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 2000);
}
</script>

</body>
</html>
